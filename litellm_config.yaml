model_list:
  # Primary coding model
  - model_name: claude-sonnet-4.6
    litellm_params:
      model: bedrock/eu.anthropic.claude-sonnet-4-6
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      supports_prompt_caching: true
      max_input_tokens: 200000
      max_output_tokens: 64000

  - model_name: claude-sonnet
    litellm_params:
      model: bedrock/eu.anthropic.claude-sonnet-4-6
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      supports_prompt_caching: true
      max_input_tokens: 200000
      max_output_tokens: 64000

  - model_name: claude-haiku-4.5
    litellm_params:
      model: bedrock/eu.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      supports_prompt_caching: true
      max_input_tokens: 200000
      max_output_tokens: 16000

  - model_name: claude-haiku
    litellm_params:
      model: bedrock/eu.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      supports_prompt_caching: true
      max_input_tokens: 200000
      max_output_tokens: 16000

  # Optional extras (enable if model access is granted)
  - model_name: nova-lite
    litellm_params:
      model: bedrock/eu.amazon.nova-lite-v1:0
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      max_input_tokens: 300000
      max_output_tokens: 5120

  - model_name: qwen3-coder
    litellm_params:
      model: bedrock/qwen.qwen3-coder-30b-a3b-v1:0
      aws_profile_name: os.environ/AWS_PROFILE
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 8192

  # Auto routing: keyword complexity router (bedrock-auto)
  - model_name: bedrock-auto
    litellm_params:
      model: auto_router/complexity_router
      complexity_router_default_model: qwen3-coder
      complexity_router_config:
        tiers:
          SIMPLE: qwen3-coder
          MEDIUM: claude-haiku
          COMPLEX: claude-sonnet
          REASONING: claude-sonnet
        default_model: qwen3-coder
    model_info:
      supports_prompt_caching: true

router_settings:
  routing_strategy: simple-shuffle

litellm_settings:
  set_verbose: false
  default_key_generate_params:
    models:
      - bedrock-auto
      - claude-haiku
      - claude-sonnet
      - qwen3-coder
    max_budget: 30
    budget_duration: 30d
  cache: true
  cache_params:
    type: disk
    disk_cache_dir: /app/.litellm_cache
    ttl: 3600
    supported_call_types:
      - completion
      - acompletion
  callbacks: ["callbacks.handler.proxy_handler_instance"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
